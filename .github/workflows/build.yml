name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # PRs: just verify it compiles (debug, no signing secrets needed).
  debug:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: chmod +x ./gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

  # main / manual: build a signed release APK and publish it to the "latest" GitHub Release.
  release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: chmod +x ./gradlew

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish to "latest" GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest "$APK#Endurain-Bridge.apk" \
            --title "Latest signed APK" \
            --notes "Signed debug/consistent-key APK built from ${{ github.sha }}. Install directly on your phone; reinstalling a newer build over it does not require uninstalling (same signing key)." \
            --latest
